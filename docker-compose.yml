version: '3.8'

services:
  web:
    build: .
    container_name: chillidoc-ai
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=change-this-in-production
    volumes:
      - ./uploads:/app/uploads
      - ./best_chilli_disease_model.h5:/app/best_chilli_disease_model.h5:ro
      - ./class_names.json:/app/class_names.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - chillidoc-network

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: chillidoc-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - chillidoc-network

networks:
  chillidoc-network:
    driver: bridge

volumes:
  uploads:
