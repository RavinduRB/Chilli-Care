services:
  - type: web
    name: chilli-care
    env: python
    region: oregon
    plan: free
    buildCommand: |
      git lfs install
      git lfs pull
      pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 120 --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
