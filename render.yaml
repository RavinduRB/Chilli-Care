services:
  - type: web
    name: chilli-care
    env: python
    region: oregon
    plan: starter  # Upgrade to Starter plan ($7/month) for 512MB+ RAM
    buildCommand: |
      git lfs install
      git lfs pull chilli_disease_detection_model_final.h5
      pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 120 --workers 1 --max-requests 1000 --max-requests-jitter 50
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: TF_CPP_MIN_LOG_LEVEL
        value: '2'
      - key: TF_ENABLE_ONEDNN_OPTS
        value: '0'
